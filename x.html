const StarField=()=>{
const canvasRef=useRef(null);
useEffect(()=>{
const canvas=canvasRef.current,ctx=canvas.getContext('2d');
let animationFrameId,stars=Array.from({length:333},()=>({x:Math.random()*1600-800,y:Math.random()*1600-800,z:Math.random()*1600}));
const resize=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight};
const animate=()=>{
ctx.clearRect(0,0,canvas.width,canvas.height);
const cX=canvas.width/2,cY=canvas.height/2;
stars.forEach(s=>{
s.z-=1.5;if(s.z<=0){s.z=1600;s.x=Math.random()*1600-800;s.y=Math.random()*1600-800}
const k=128/s.z,px=s.x*k+cX,py=s.y*k+cY;
if(px>=0&&px<=canvas.width&&py>=0&&py<=canvas.height){
const size=(1-s.z/1600)*2.5,opacity=(1-s.z/1600)*0.5+0.5;
ctx.fillStyle=`rgba(255,255,255,${opacity})`;ctx.beginPath();ctx.arc(px,py,size/2,0,Math.PI*2);ctx.fill()
}
});
animationFrameId=requestAnimationFrame(animate)
};
resize();animate();
window.addEventListener('resize',resize);
return()=>{cancelAnimationFrame(animationFrameId);window.removeEventListener('resize',resize)}
},[]);
return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-0 opacity-100"/>
};
